<div>
  <h1>Task Management System</h1>

  <div>
    <input
      type="text"
      [(ngModel)]="newTaskTitle"
      placeholder="Enter new task..."
    />
    <button (click)="addTask()">Add Task</button>
  </div>

  <hr />

  <p *ngIf="tasks.length === 0">No tasks yet. Add one above!</p>

  <ul>
    <li *ngFor="let task of tasks">

      <ng-container *ngIf="editingTask?._id !== task._id">
        <input type="checkbox" [checked]="task.completed" (change)="toggleComplete(task)" />
        <span [style.textDecoration]="task.completed ? 'line-through' : 'none'">
          {{ task.title }}
        </span>
        <button (click)="startEdit(task)">Edit</button>
        <button (click)="deleteTask(task._id!)">Delete</button>
      </ng-container>

      <ng-container *ngIf="editingTask?._id === task._id">
        <input type="text" [(ngModel)]="editTitle" />
        <button (click)="saveEdit()">Save</button>
        <button (click)="cancelEdit()">Cancel</button>
      </ng-container>

    </li>
  </ul>
</div>
